<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission History - AstroPath</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="stars-bg" id="stars-container"></div>
    
    <nav>
        <a href="/" class="brand">AstroPath</a>
        <ul id="nav-links">
            <li><a href="/dashboard.html">Dashboard</a></li>
            <li><a href="/new_mission.html">New Mission</a></li>
            <li><a href="/missions.html" style="color: var(--accent-neon);">History</a></li>
            <li><a href="/planets.html">Planets</a></li>
            <li><a href="#" onclick="logoutUser()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="text-center mb-2">Mission Log</h2>
        
        <div id="missions-container" class="grid grid-2">
            <!-- Missions will be loaded here -->
        </div>
        <p id="no-missions" class="text-center mt-2" style="display: none;">No missions logged yet.</p>
    </div>

    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            generateStars(100);
            requireAuth();
            
            const container = document.getElementById('missions-container');
            const noMissions = document.getElementById('no-missions');
            
            const loadMissions = async () => {
                const missions = await getMissions();
                container.innerHTML = '';
                if(!missions || missions.length === 0) {
                    noMissions.style.display = 'block';
                    return;
                }
                
                missions.forEach(m => {
                    const d = new Date(m.created_at).toLocaleDateString();
                    const card = document.createElement('div');
                    card.className = 'glass-card';
                    card.innerHTML = `
                        <h3 style="color: var(--accent-neon);">${m.source} ➔ ${m.destination}</h3>
                        <p class="mt-2"><strong>Speed:</strong> ${m.speed.toLocaleString()} km/h</p>
                        <p><strong>Distance:</strong> ${m.distance.toLocaleString()} km</p>
                        <p><strong>Time:</strong> ${m.travel_time_days} Days (${m.travel_time_years} Years)</p>
                        <p style="font-size: 0.8rem; margin-top: 10px; color: var(--accent-blue);">Logged: ${d}</p>
                        <button class="btn-neon" style="margin-top: 10px; padding: 5px 10px; font-size: 0.8rem; border-color: #ff4c4c; color: #ff4c4c;" onclick="deleteM(${m.id})">Delete</button>
                    `;
                    container.appendChild(card);
                });
            };
            
            window.deleteM = async (id) => {
                if(confirm("Are you sure you want to delete this mission log?")) {
                    await deleteMission(id);
                    loadMissions();
                }
            };
            
            loadMissions();
        });
    </script>
</body>
</html>
