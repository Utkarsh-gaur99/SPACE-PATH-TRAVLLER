<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AstroPath</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="stars-bg" id="stars-container"></div>
    
    <nav>
        <a href="/" class="brand">AstroPath</a>
        <ul id="nav-links">
            <li><a href="/register.html">Register</a></li>
        </ul>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="glass-card" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-2">Pilot Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Callsign (Username)</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Access Code (Password)</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-neon" style="width: 100%; margin-top: 1rem;">Authenticate</button>
                <div id="login-error" class="error-msg text-center"></div>
            </form>
            <p class="text-center mt-2" style="font-size: 0.9rem;">New pilot? <a href="/register.html" style="color: var(--accent-neon);">Register here</a></p>
        </div>
    </div>

    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            generateStars(50);
            if(isAuthenticated()) {
                window.location.href = '/dashboard.html';
            }
            
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const errDiv = document.getElementById('login-error');
                
                const success = await loginUser(u, p);
                if(success) {
                    window.location.href = '/dashboard.html';
                } else {
                    errDiv.textContent = 'Authentication failed. Check credentials.';
                    errDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
