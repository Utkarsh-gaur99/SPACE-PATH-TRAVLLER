<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AstroPath</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="stars-bg" id="stars-container"></div>
    
    <nav>
        <a href="/" class="brand">AstroPath</a>
        <ul id="nav-links">
            <li><a href="/dashboard.html" style="color: var(--accent-neon);">Dashboard</a></li>
            <li><a href="/new_mission.html">New Mission</a></li>
            <li><a href="/missions.html">History</a></li>
            <li><a href="/planets.html">Planets</a></li>
            <li><a href="#" onclick="logoutUser()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="mb-2" id="welcome-msg">Welcome, Pilot</h2>
        
        <div class="grid grid-3 mb-2">
            <div class="glass-card text-center">
                <h4 style="color: var(--accent-blue);">Total Missions</h4>
                <p id="total-missions" style="font-size: 2rem; margin-top: 10px; font-weight: bold;">0</p>
            </div>
            <div class="glass-card text-center">
                <h4 style="color: var(--accent-blue);">Total Distance (km)</h4>
                <p id="total-distance" style="font-size: 2rem; margin-top: 10px; font-weight: bold;">0</p>
            </div>
            <div class="glass-card text-center">
                <h4 style="color: var(--accent-blue);">Favorite Destination</h4>
                <p id="favorite-dest" style="font-size: 1.5rem; margin-top: 10px; font-weight: bold;">None</p>
            </div>
        </div>

        <div class="text-center mt-2">
            <a href="/new_mission.html" class="btn-neon" style="font-size: 1.2rem; padding: 15px 30px;">Plan New Mission</a>
        </div>
    </div>

    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            generateStars(100);
            requireAuth();
            
            const stats = await getDashboardStats();
            if(stats) {
                document.getElementById('welcome-msg').textContent = `Welcome, Pilot ${stats.username}`;
                document.getElementById('total-missions').textContent = stats.total_missions;
                document.getElementById('total-distance').textContent = stats.total_distance_km.toLocaleString();
                document.getElementById('favorite-dest').textContent = stats.favorite_destination;
            }
        });
    </script>
</body>
</html>
